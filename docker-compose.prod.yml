# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env with production values (strong passwords, real API keys)
#   - TLS certs in docker/nginx/certs/ (or use certbot service below)
#   - Frontend built: frontend/dist/ must exist
#
services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    restart: always
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    shm_size: "256mb"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=1000"

  # ── Redis ───────────────────────────────────────────────
  redis:
    restart: always
    ports: !reset []
    command: >-
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}

  # ── MinIO ───────────────────────────────────────────────
  minio:
    restart: always
    ports: !override
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER: "off"

  # ── Meilisearch ─────────────────────────────────────────
  meilisearch:
    restart: always
    ports: !reset []
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}

  # ── Backend API ─────────────────────────────────────────
  api:
    restart: always
    ports: !reset []
    volumes: !reset []
    command: >-
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
      --log-level warning

  # ── Celery Worker ───────────────────────────────────────
  celery-worker:
    restart: always
    volumes: !reset []
    command: >-
      celery -A app.tasks worker
      -Q publish,ai,system
      --loglevel=warning
      --concurrency=4
      --max-tasks-per-child=1000

  # ── Celery Beat ─────────────────────────────────────────
  celery-beat:
    restart: always
    volumes: !reset []

  # ── Nginx ───────────────────────────────────────────────
  nginx:
    restart: always
    ports: !override
      - "80:80"
      - "443:443"
    volumes: !override
      - ./docker/nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api

  # ── Certbot (Let's Encrypt) ─────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: "no"
    volumes:
      - ./docker/nginx/certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c
    command:
      - |
        certbot certonly --webroot \
          --webroot-path=/var/www/certbot \
          --email ${CERTBOT_EMAIL:-admin@publisync.kr} \
          --agree-tos \
          --no-eff-email \
          -d ${DOMAIN:-publisync.kr} \
          -d www.${DOMAIN:-publisync.kr} \
          --keep-until-expiring \
          --quiet

  # ── Prometheus ──────────────────────────────────────────
  prometheus:
    restart: always
    ports: !reset []

  # ── Grafana ─────────────────────────────────────────────
  grafana:
    restart: always
    ports: !reset []
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${DOMAIN:-publisync.kr}/grafana/"

  # ── Postgres Exporter ──────────────────────────────────
  postgres-exporter:
    restart: always

  # ── Redis Exporter ─────────────────────────────────────
  redis-exporter:
    restart: always

  # ── Loki ───────────────────────────────────────────────
  loki:
    restart: always
    ports: !reset []

volumes:
  certbot_webroot:
