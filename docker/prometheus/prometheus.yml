global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "publisync-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "backend"

  - job_name: "celery-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["celery-worker:8001"]
        labels:
          service: "celery"

  - job_name: "nginx"
    metrics_path: /metrics
    static_configs:
      - targets: ["nginx:9113"]
        labels:
          service: "nginx"

  - job_name: "postgres"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  - job_name: "redis"
    metrics_path: /metrics
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
